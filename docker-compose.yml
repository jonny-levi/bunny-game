# Docker Compose for local development
# Bunny Family Game with Redis for local testing

version: '3.8'

services:
  # Redis service for game state persistence
  redis:
    image: redis:7-alpine
    container_name: bunny-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass localdev123
    volumes:
      - redis_data:/data
    networks:
      - bunny-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "localdev123", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Main application service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bunny-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_AUTH_TOKEN=localdev123
    volumes:
      # Mount source code for hot reloading in development
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      # Don't mount node_modules (use container's version)
      - /app/backend/node_modules
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bunny-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Redis Commander for database management (development only)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: bunny-redis-commander
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379:0:localdev123
    depends_on:
      - redis
    networks:
      - bunny-network
    profiles:
      - debug

  # Nginx for local SSL/load balancing testing (optional)
  nginx:
    image: nginx:alpine
    container_name: bunny-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - bunny-network
    profiles:
      - nginx

volumes:
  redis_data:
    driver: local

networks:
  bunny-network:
    driver: bridge

# Development helper targets
x-development: &development
  extends:
    service: app
  environment:
    - NODE_ENV=development
    - LOG_LEVEL=debug
  volumes:
    - ./backend:/app/backend
    - ./frontend:/app/frontend
    - /app/backend/node_modules

# Usage instructions:
# 1. Basic development: docker-compose up
# 2. With Redis Commander: docker-compose --profile debug up
# 3. With Nginx proxy: docker-compose --profile nginx up
# 4. Build production image: docker-compose -f docker-compose.prod.yml build