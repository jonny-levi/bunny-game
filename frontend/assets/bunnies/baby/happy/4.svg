<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Left Ear -->
  <ellipse cx="42" cy="27" rx="10" ry="25" fill="#C5C9FF" transform="rotate(-15 42 27)" stroke="#AAAFFF" stroke-width="0.5"/>
  <ellipse cx="42" cy="29" rx="5" ry="18" fill="#ff69b4" transform="rotate(-15 42 29)" opacity="0.6"/>

  <!-- Right Ear -->
  <ellipse cx="78" cy="27" rx="10" ry="25" fill="#C5C9FF" transform="rotate(15 78 27)" stroke="#AAAFFF" stroke-width="0.5"/>
  <ellipse cx="78" cy="29" rx="5" ry="18" fill="#ff69b4" transform="rotate(15 78 29)" opacity="0.6"/>

  <!-- Head -->
  <circle cx="60" cy="54" r="27" fill="#C5C9FF" stroke="#AAAFFF" stroke-width="0.5"/>

  <!-- Fur fluff on head -->
  <circle cx="45" cy="45" r="4" fill="#E0E3FF" opacity="0.8"/>
  <circle cx="75" cy="45" r="4" fill="#E0E3FF" opacity="0.8"/>
  <circle cx="51" cy="39" r="3" fill="#E0E3FF" opacity="0.7"/>
  <circle cx="69" cy="39" r="3" fill="#E0E3FF" opacity="0.7"/>

  <!-- Happy closed eyes (curved upward) -->
  <path d="M 45 50 Q 51 47 57 50" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 63 50 Q 69 47 75 50" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Eye shine sparkles -->
  <circle cx="48" cy="48" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="72" cy="48" r="1.5" fill="white" opacity="0.9"/>

  <!-- Rosy Blush (bigger for happy) -->
  <ellipse cx="40" cy="57" rx="8" ry="5" fill="#ff69b4" opacity="0.5"/>
  <ellipse cx="80" cy="57" rx="8" ry="5" fill="#ff69b4" opacity="0.5"/>

  <!-- Nose -->
  <ellipse cx="60" cy="59" rx="3" ry="2.5" fill="#ff69b4"/>

  <!-- Whiskers - Left side -->
  <line x1="39" y1="58" x2="21" y2="56" stroke="#AAAFFF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="39" y1="60" x2="21" y2="62" stroke="#AAAFFF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="41" y1="59" x2="24" y2="59" stroke="#AAAFFF" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Whiskers - Right side -->
  <line x1="81" y1="58" x2="99" y2="56" stroke="#AAAFFF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="81" y1="60" x2="99" y2="62" stroke="#AAAFFF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="79" y1="59" x2="96" y2="59" stroke="#AAAFFF" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Big Happy Smile -->
  <path d="M 50 62 Q 60 70 70 62" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Smile dimples -->
  <circle cx="48" cy="63" r="1.5" fill="#ff69b4" opacity="0.3"/>
  <circle cx="72" cy="63" r="1.5" fill="#ff69b4" opacity="0.3"/>

  <!-- Body -->
  <ellipse cx="60" cy="87" rx="24" ry="27" fill="#C5C9FF" stroke="#AAAFFF" stroke-width="0.5"/>

  <!-- Fur fluff on body -->
  <circle cx="45" cy="81" r="5" fill="#E0E3FF" opacity="0.8"/>
  <circle cx="75" cy="81" r="5" fill="#E0E3FF" opacity="0.8"/>
  <circle cx="48" cy="93" r="4" fill="#E0E3FF" opacity="0.7"/>
  <circle cx="72" cy="93" r="4" fill="#E0E3FF" opacity="0.7"/>

  <!-- Left Paw -->
  <ellipse cx="45" cy="105" rx="7" ry="9" fill="#C5C9FF" stroke="#AAAFFF" stroke-width="0.5"/>
  <circle cx="45" cy="112" r="4" fill="#E0E3FF"/>

  <!-- Right Paw -->
  <ellipse cx="75" cy="105" rx="7" ry="9" fill="#C5C9FF" stroke="#AAAFFF" stroke-width="0.5"/>
  <circle cx="75" cy="112" r="4" fill="#E0E3FF"/>

  <!-- Fluffy Tail -->
  <circle cx="84" cy="93" r="9" fill="#C5C9FF" stroke="#AAAFFF" stroke-width="0.5"/>
  <circle cx="87" cy="90" r="7" fill="#E0E3FF" opacity="0.9"/>
  <circle cx="89" cy="93" r="6" fill="#E0E3FF" opacity="0.8"/>
  <circle cx="87" cy="96" r="5" fill="#E0E3FF" opacity="0.7"/>

  <!-- Heart sparkle (happy) -->
  <path d="M 60 35 L 61 37 L 63 37 L 61.5 38.5 L 62 40 L 60 39 L 58 40 L 58.5 38.5 L 57 37 L 59 37 Z" fill="#ff69b4" opacity="0.6"/>
</svg>