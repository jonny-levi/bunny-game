<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐰 Bunny Family</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a3e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    #game-container { position: relative; }
    canvas { display: block; }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>

    <style>
      @font-face { font-family: 'Fredoka'; src: url('/assets/fonts/Fredoka-Regular.ttf') format('truetype'); font-display: swap; }
      @font-face { font-family: 'Nunito'; src: url('/assets/fonts/Nunito-Regular.ttf') format('truetype'); font-display: swap; }
    </style>
  </head>
<body>
  <div id="sr-status" class="sr-only" aria-live="polite" aria-atomic="true">Bunny Game loading</div>
  <div id="game-container" role="application" aria-label="Bunny Game canvas. Use Tab to cycle bunnies, brackets to change rooms, number keys for actions, and question mark for help."></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
