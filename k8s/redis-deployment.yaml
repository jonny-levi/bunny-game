apiVersion: apps/v1
kind: Deployment
metadata:
  name: bunny-redis
  namespace: bunny-game
  labels:
    app: bunny-redis
    component: cache
spec:
  replicas: 1  # Redis is stateful, single replica for simplicity
  selector:
    matchLabels:
      app: bunny-redis
  template:
    metadata:
      labels:
        app: bunny-redis
        component: cache
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 6379
          protocol: TCP
        command:
        - redis-server
        args:
        - --maxmemory
        - 512mb
        - --maxmemory-policy
        - allkeys-lru
        - --save
        - "900 1"
        - --appendonly
        - "yes"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: redis-storage
          mountPath: /data
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        securityContext:
          runAsUser: 999  # redis user
          runAsGroup: 999
          allowPrivilegeEscalation: false
      volumes:
      - name: redis-storage
        persistentVolumeClaim:
          claimName: bunny-redis-pvc