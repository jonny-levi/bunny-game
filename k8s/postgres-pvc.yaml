apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bunny-postgres-pvc
  namespace: bunny-game
  labels:
    app: bunny-postgres
    component: database
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: ""  # Use default storage class