apiVersion: v1
kind: Service
metadata:
  name: bunny-backend
  namespace: bunny-game
  labels:
    app: bunny-backend
    component: backend
  annotations:
    metallb.io/ip-allocated-from-pool: first-pool
spec:
  type: LoadBalancer
  loadBalancerIP: 172.20.10.114
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  ports:
  - port: 80
    targetPort: 3001
    protocol: TCP
    name: http
  selector:
    app: bunny-backend
