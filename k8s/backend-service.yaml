apiVersion: v1
kind: Service
metadata:
  name: bunny-backend
  namespace: bunny-game
  labels:
    app: bunny-backend
    component: backend
spec:
  type: ClusterIP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800  # 3 hours for Socket.IO sessions
  ports:
  - port: 3001
    targetPort: 3001
    protocol: TCP
    name: http
  selector:
    app: bunny-backend