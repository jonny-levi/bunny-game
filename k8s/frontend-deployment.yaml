apiVersion: apps/v1
kind: Deployment
metadata:
  name: bunny-frontend
  namespace: bunny-game
  labels:
    app: bunny-frontend
    component: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bunny-frontend
  template:
    metadata:
      labels:
        app: bunny-frontend
        component: frontend
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - bunny-frontend
              topologyKey: kubernetes.io/hostname
      containers:
      - name: frontend
        image: 172.20.10.120:5000/bunny-game:v7-2d
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          protocol: TCP
        env:
        - name: NODE_ENV
          value: production
        - name: API_URL
          value: http://bunny-backend:3001
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false