apiVersion: apps/v1
kind: Deployment
metadata:
  name: bunny-backend
  namespace: bunny-game
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bunny-backend
  template:
    metadata:
      labels:
        app: bunny-backend
    spec:
      nodeSelector:
        kubernetes.io/hostname: worker-node01
      containers:
      - name: backend
        image: 172.20.10.120:5000/bunny-backend:latest
        imagePullPolicy: Always
        env:
        - name: DATABASE_URL
          value: postgresql://bunny:bunny123@bunny-postgres:5432/bunny_family
        - name: REDIS_URL
          value: redis://bunny-redis:6379
        - name: PORT
          value: "3001"
        ports:
        - containerPort: 3001
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: bunny-backend
  namespace: bunny-game
spec:
  selector:
    app: bunny-backend
  ports:
  - port: 3001
    targetPort: 3001
