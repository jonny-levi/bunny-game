apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bunny-postgres-pvc
  namespace: bunny-game
spec:
  storageClassName: nfs-client
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bunny-postgres
  namespace: bunny-game
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bunny-postgres
  template:
    metadata:
      labels:
        app: bunny-postgres
    spec:
      nodeSelector:
        kubernetes.io/hostname: worker-node02
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_USER
          value: bunny
        - name: POSTGRES_PASSWORD
          value: bunny123
        - name: POSTGRES_DB
          value: bunny_family
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: bunny-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: bunny-postgres
  namespace: bunny-game
spec:
  selector:
    app: bunny-postgres
  ports:
  - port: 5432
    targetPort: 5432
