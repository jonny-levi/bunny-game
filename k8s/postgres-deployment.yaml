apiVersion: apps/v1
kind: Deployment
metadata:
  name: bunny-postgres
  namespace: bunny-game
  labels:
    app: bunny-postgres
    component: database
spec:
  replicas: 1  # PostgreSQL is stateful, single replica for simplicity
  selector:
    matchLabels:
      app: bunny-postgres
  template:
    metadata:
      labels:
        app: bunny-postgres
        component: database
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5432
          protocol: TCP
        env:
        - name: POSTGRES_USER
          value: bunny
        - name: POSTGRES_PASSWORD
          value: bunny123
        - name: POSTGRES_DB
          value: bunny_family
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        - name: POSTGRES_INITDB_ARGS
          value: "--auth-local=trust"
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - pg_isready -U bunny -d bunny_family
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - pg_isready -U bunny -d bunny_family
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        securityContext:
          runAsUser: 999  # postgres user
          runAsGroup: 999
          allowPrivilegeEscalation: false
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: bunny-postgres-pvc